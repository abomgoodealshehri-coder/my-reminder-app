<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مذكّري الذكي ⏰</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* التنسيقات العامة (نفس ستايلك الجميل) */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Cairo', sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #eee; min-height: 100vh; padding: 15px; padding-bottom: 80px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { text-align: center; padding: 25px 0; background: rgba(255, 255, 255, 0.05); border-radius: 20px; margin-bottom: 20px; backdrop-filter: blur(10px); }
        h1 { font-size: 28px; color: #00d4ff; font-weight: 800; }
        .status-bar { background: rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; }
        .status-value { color: #00d4ff; font-weight: 700; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: 'Cairo'; margin-bottom: 10px; }
        .btn-start { background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%); color: #fff; }
        .add-form { background: rgba(255, 255, 255, 0.05); border-radius: 15px; padding: 20px; margin-bottom: 20px; display: none; }
        .add-form.show { display: block; }
        .form-group { margin-bottom: 15px; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border-radius: 10px; background: rgba(255, 255, 255, 0.05); color: #fff; border: 1px solid rgba(255, 255, 255, 0.1); }
        .reminder-card { background: rgba(255, 255, 255, 0.05); border-radius: 15px; padding: 18px; margin-bottom: 10px; border-right: 5px solid #00d4ff; }
        .alert-box { position: fixed; top: 20px; left: 20px; right: 20px; background: #0099cc; padding: 25px; border-radius: 20px; transform: translateY(-200%); transition: 0.5s; z-index: 1000; text-align: center; }
        .alert-box.show { transform: translateY(0); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div style="font-size: 50px;">⏰</div>
            <h1>مذكّري السعودي</h1>
            <p style="color: #aaa;">بصوت عبدالله سعدون 🇸🇦</p>
        </div>

        <div class="status-bar">
            <div class="status-item">الحالة: <span id="appStatus" class="status-value">متوقف</span></div>
            <div class="status-item">الوقت: <span id="currentTime" class="status-value">--:--</span></div>
        </div>

        <button class="btn btn-start" id="startBtn" onclick="toggleApp()">▶️ تشغيل المنبه</button>
        <button class="btn" style="background: #5f27cd; color: white;" onclick="toggleForm()">➕ إضافة تذكير جديد</button>

        <div class="add-form" id="addForm">
            <div class="form-group">
                <label>⏰ اختر الوقت</label>
                <input type="time" id="timeInput">
            </div>
            <div class="form-group">
                <label>📝 وش نذكرك فيه؟</label>
                <textarea id="textInput" placeholder="مثال: يا أبو مجودي لا تنسى الصلاة"></textarea>
            </div>
            <button class="btn btn-start" onclick="addReminder()">✅ حفظ</button>
        </div>

        <div id="remindersList"></div>
    </div>

    <div class="alert-box" id="alertBox">
        <h2 id="alertMessage">تنبيه!</h2>
        <p>حان الآن موعد التذكير</p>
    </div>

    <script>
        // --- الإعدادات الخاصة بك (تم التحديث بناءً على صورك) ---
        const EL_API_KEY = "sk_01bf98d8e210b771de3a42811748ba942b88ae3516ddd231"; //
        const ABDULLAH_VOICE_ID = "f9akNmCDHz23DCFXOYmn"; //
        
        let reminders = JSON.parse(localStorage.getItem('reminders') || '[]');
        let isRunning = false;
        let timer = null;

        function toggleForm() { document.getElementById('addForm').classList.toggle('show'); }

        function addReminder() {
            const time = document.getElementById('timeInput').value;
            const text = document.getElementById('textInput').value;
            if(!time || !text) return alert("عبّ البيانات يا غالي");
            
            reminders.push({ time, text, activated: false });
            localStorage.setItem('reminders', JSON.stringify(reminders));
            updateUI();
            toggleForm();
        }

        async function speak(text) {
            try {
                const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${ABDULLAH_VOICE_ID}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'xi-api-key': EL_API_KEY },
                    body: JSON.stringify({
                        text: text,
                        model_id: "eleven_multilingual_v2",
                        voice_settings: { stability: 0.5, similarity_boost: 0.75 }
                    })
                });
                const blob = await response.blob();
                const audio = new Audio(URL.createObjectURL(blob));
                audio.play();
            } catch (e) { console.error("خطأ في الصوت", e); }
        }

        function checkReminders() {
            const now = new Date();
            const nowStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            
            reminders.forEach(r => {
                if (r.time === nowStr && !r.activated) {
                    r.activated = true;
                    showNotification(r.text);
                    speak(r.text);
                    updateUI();
                }
            });
        }

        function showNotification(msg) {
            const box = document.getElementById('alertBox');
            document.getElementById('alertMessage').textContent = msg;
            box.classList.add('show');
            setTimeout(() => box.classList.remove('show'), 10000);
        }

        function updateUI() {
            const list = document.getElementById('remindersList');
            list.innerHTML = reminders.map((r, i) => `
                <div class="reminder-card">
                    <strong>${r.time}</strong> - ${r.text} ${r.activated ? '✅' : '⏳'}
                    <button onclick="deleteRem(${i})" style="float:left; background:none; border:none; color:red; cursor:pointer;">حذف</button>
                </div>
            `).join('');
        }

        function deleteRem(i) {
            reminders.splice(i, 1);
            localStorage.setItem('reminders', JSON.stringify(reminders));
            updateUI();
        }

        function toggleApp() {
            isRunning = !isRunning;
            const btn = document.getElementById('startBtn');
            if(isRunning) {
                timer = setInterval(() => { checkReminders(); updateTime(); }, 1000);
                btn.textContent = "⏸️ إيقاف المنبه";
                btn.style.background = "red";
                document.getElementById('appStatus').textContent = "يعمل الآن";
                speak("تم تشغيل المذكر بنجاح");
            } else {
                clearInterval(timer);
                btn.textContent = "▶️ تشغيل المنبه";
                btn.style.background = "#00d4ff";
                document.getElementById('appStatus').textContent = "متوقف";
            }
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('currentTime').textContent = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        }

        updateUI();
    </script>
</body>
</html>
