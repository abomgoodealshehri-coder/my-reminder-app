<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>مذكّري - نسخة الصوت المدمج</title>
<style>
/* ستايل مختصر للحفاظ على حجم الكود - يمكنك استبداله بستايلك القديم */
body { font-family: sans-serif; background: #1a1a2e; color: #fff; text-align: center; padding: 20px; }
.alarm-active { animation: shake 0.5s infinite; background: #c0392b !important; }
@keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -2px); } 100% { transform: translate(1px, 1px); } }
button { padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 10px; border: none; background: #00d4ff; color: #000; margin: 10px; }
.list { margin-top: 20px; text-align: right; background: #16213e; padding: 15px; border-radius: 10px; }
</style>
</head>
<body>

<h1>⏰ مذكّري الخاص</h1>
<p id="currentTime">--:--:--</p>

<div style="margin-bottom: 20px;">
<input type="text" id="taskName" placeholder="ماذا تريد أن تفعل؟" style="padding: 10px; border-radius: 5px; width: 60%;">
<input type="time" id="alarmTime" style="padding: 10px; border-radius: 5px;">
<button onclick="addReminder()">إضافة منبه</button>
</div>

<div id="remindersList" class="list">
<h3>المنبهات القادمة:</h3>
<ul id="items" style="list-style: none; padding: 0;"></ul>
</div>

<audio id="alarmAudio" preload="auto">
<source src="data:audio/x-m4a;base64," type="audio/mp4">
</audio>

<div id="alarmControls" style="display:none; margin-top:20px;">
<h2 style="color: #ff4d4d;">حان الوقت!</h2>
<button onclick="stopAlarm()" style="background: #ff4d4d; color: white;">إيقاف التنبيه</button>
</div>

<script>
let reminders = JSON.parse(localStorage.getItem('my_reminders') || '[]');
const audio = document.getElementById('alarmAudio');
let audioUnlocked = false;

// تفعيل الصوت عند أول لمسة للشاشة (لحل مشكلة المتصفح)
document.body.addEventListener('touchstart', unlockAudio);
document.body.addEventListener('click', unlockAudio);

function unlockAudio() {
if (!audioUnlocked) {
audio.play().then(() => {
audio.pause();
audio.currentTime = 0;
audioUnlocked = true;
}).catch(e => console.log("تحتاج للتفاعل مع الصفحة أولاً"));
}
}

function updateCurrentTime() {
const now = new Date();
const timeStr = now.getHours().toString().padStart(2, '0') + ":" +
now.getMinutes().toString().padStart(2, '0') + ":" +
now.getSeconds().toString().padStart(2, '0');
document.getElementById('currentTime').innerText = "الوقت الآن: " + timeStr;

checkAlarms(timeStr.substring(0, 5));
}

function addReminder() {
const name = document.getElementById('taskName').value;
const time = document.getElementById('alarmTime').value;
if (name && time) {
reminders.push({ name, time, active: true });
localStorage.setItem('my_reminders', JSON.stringify(reminders));
renderReminders();
alert("تم ضبط المنبه!");
}
}

function renderReminders() {
const list = document.getElementById('items');
list.innerHTML = reminders.map((r, i) => `
<li>${r.time} - ${r.name} <button onclick="deleteReminder(${i})">حذف</button></li>
`).join('');
}

function deleteReminder(index) {
reminders.splice(index, 1);
localStorage.setItem('my_reminders', JSON.stringify(reminders));
renderReminders();
}

function checkAlarms(currentTime) {
reminders.forEach((r, index) => {
if (r.time === currentTime && r.active) {
startAlarm();
r.active = false; // تفعيل لمرة واحدة
}
});
}

function startAlarm() {
audio.loop = true;
audio.play();
document.body.classList.add('alarm-active');
document.getElementById('alarmControls').style.display = 'block';
if (navigator.vibrate) navigator.vibrate([500, 200, 500]);
}

function stopAlarm() {
audio.pause();
audio.currentTime = 0;
document.body.classList.remove('alarm-active');
document.getElementById('alarmControls').style.display = 'none';
if (navigator.vibrate) navigator.vibrate(0);
}

setInterval(updateCurrentTime, 1000);
renderReminders();
</script>
</body>
</html>
